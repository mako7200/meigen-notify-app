<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>今日の名言</title>
  <meta name="description" content="あなたの心に刺さる名言が、きっと見つかる。">

  <!-- PWA設定 -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0a0820">

  <!-- iOS PWA設定 -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="今日の名言">
  <link rel="apple-touch-icon" href="icons/icon-192.png">

  <link rel="icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="splash">
  <div class="splash-icon">📜</div>
  <div class="splash-title">今日の名言</div>
</div>

<div id="app">

  <!-- ヘッダー -->
  <header>
    <div class="header-title">
      <span class="header-icon">📜</span>
      <span id="header-title-text">ホーム</span>
    </div>
  </header>

  <!-- 強制更新モーダル -->
  <div id="update-modal-overlay" class="modal-overlay force-update-overlay">
    <div class="modal force-update-modal">
      <svg class="force-update-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182m0-4.991v4.99"/></svg>
      <div class="modal-title">新しいバージョンがあります</div>
      <p class="force-update-text">続けてご利用いただくには、アップデートが必要です。</p>
      <button class="btn-save force-update-btn" id="update-btn">今すぐ更新する</button>
    </div>
  </div>

  <!-- メインコンテンツ -->
  <main>

    <!-- ホームタブ -->
    <section id="tab-home" class="tab-section active">
      <p class="home-date" id="home-date"></p>
      <div id="home-quote-area"></div>

      <!-- 日記セクション -->
      <div class="diary-section" id="diary-section" style="display:none">
        <button class="diary-toggle-btn" id="diary-toggle-btn">
          <svg class="diary-toggle-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="m16.862 4.487 1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L10.582 16.07a4.5 4.5 0 0 1-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 0 1 1.13-1.897l8.932-8.931Zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0 1 15.75 21H5.25A2.25 2.25 0 0 1 3 18.75V8.25A2.25 2.25 0 0 1 5.25 6H10"/></svg>
          コメントを書く
        </button>
        <div class="diary-editor hidden" id="diary-editor">
          <textarea class="diary-textarea" id="diary-textarea" maxlength="100"></textarea>
          <div class="diary-meta">
            <span class="diary-char-count" id="diary-char-count">0 / 100</span>
            <div class="diary-meta-buttons">
              <button class="diary-cancel-btn" id="diary-cancel-btn">閉じる</button>
              <button class="diary-save-btn" id="diary-save-btn">保存</button>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- 一覧タブ -->
    <section id="tab-list" class="tab-section">
      <div class="search-row">
        <input type="search" class="search-box" id="list-search" placeholder="名言・著者名で検索...">
        <button class="fav-filter-btn" id="fav-filter-btn">☆</button>
      </div>
      <div class="category-filter">
        <button class="filter-btn active" data-cat="all">すべて</button>
        <button class="filter-btn" data-cat="historical">偉人・歴史</button>
        <button class="filter-btn" data-cat="philosophy">哲学・思想</button>
        <button class="filter-btn" data-cat="business">ビジネス</button>
        <button class="filter-btn" data-cat="sports">スポーツ</button>
      </div>
      <div class="count-badge" id="list-count"></div>
      <div class="quote-list" id="quote-list"></div>
    </section>

    <!-- 管理タブ -->
    <section id="tab-manage" class="tab-section">
      <button class="add-btn" id="add-quote-btn">
        + 名言を追加する
      </button>
      <div class="manage-list" id="manage-list"></div>
    </section>

    <!-- 設定タブ -->
    <section id="tab-settings" class="tab-section">

      <div class="settings-section">
        <div class="settings-section-title">通知設定</div>

        <div class="settings-row">
          <div>
            <div class="settings-label">通知をオンにする</div>
            <div class="settings-sublabel">ホーム画面に追加後に有効になります</div>
          </div>
          <label class="toggle">
            <input type="checkbox" id="notif-toggle">
            <span class="toggle-slider"></span>
          </label>
        </div>

        <div class="settings-row">
          <div>
            <div class="settings-label">通知時間</div>
            <div class="settings-sublabel">毎日この時間にお届けします</div>
          </div>
          <input type="time" class="time-input" id="notif-time" value="07:00">
        </div>

        <div class="settings-row" style="flex-direction: column; align-items: flex-start; gap: 8px;">
          <button id="test-notif-btn" style="padding:10px 20px; background:var(--bg-warm); border:1.5px solid var(--border); border-radius:10px; font-size:0.9rem; cursor:pointer; color:var(--text-sub);">
            テスト通知を送る
          </button>
          <div class="notification-note">
            <strong>iPhoneをお使いの方へ：</strong><br>
            Safariで「ホーム画面に追加」してから通知を許可してください。
            iOS 16.4以上が必要です。通知はアプリを開いたときに届きます。
          </div>
        </div>
      </div>

      <div class="settings-section">
        <div class="settings-section-title">カテゴリ設定（表示・通知対象）</div>

        <div class="settings-row">
          <label class="category-check">
            <input type="checkbox" id="cat-historical" checked>
            偉人・歴史上の人物
          </label>
        </div>
        <div class="settings-row">
          <label class="category-check">
            <input type="checkbox" id="cat-philosophy" checked>
            哲学・思想家
          </label>
        </div>
        <div class="settings-row">
          <label class="category-check">
            <input type="checkbox" id="cat-business" checked>
            ビジネス・成功者
          </label>
        </div>
        <div class="settings-row">
          <label class="category-check">
            <input type="checkbox" id="cat-sports" checked>
            スポーツ選手
          </label>
        </div>
      </div>

      <div class="settings-section">
        <div class="settings-section-title">アプリ情報</div>
        <div class="settings-row">
          <div>
            <div class="settings-label">今日の名言</div>
            <div class="settings-sublabel">Version 2.1.2</div>
          </div>
        </div>
        <div class="settings-row">
          <div class="settings-label" id="quotes-total-count"></div>
        </div>
      </div>

    </section>
  </main>

  <!-- ボトムナビゲーション -->
  <nav>
    <button class="nav-btn active" data-tab="home">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 10L12 3l9 7v10a1 1 0 01-1 1H4a1 1 0 01-1-1V10z"/>
        <path d="M9 21V13h6v8"/>
      </svg>
      ホーム
    </button>
    <button class="nav-btn" data-tab="list">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
        <line x1="4" y1="7" x2="20" y2="7"/>
        <line x1="4" y1="12" x2="20" y2="12"/>
        <line x1="4" y1="17" x2="14" y2="17"/>
      </svg>
      一覧
    </button>
    <button class="nav-btn" data-tab="manage">
      <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
      </svg>
      管理
    </button>
    <button class="nav-btn" data-tab="settings">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
        <line x1="4" y1="6" x2="20" y2="6"/>
        <line x1="4" y1="12" x2="20" y2="12"/>
        <line x1="4" y1="18" x2="20" y2="18"/>
        <circle cx="9" cy="6" r="2.2" fill="currentColor" stroke="none"/>
        <circle cx="15" cy="12" r="2.2" fill="currentColor" stroke="none"/>
        <circle cx="9" cy="18" r="2.2" fill="currentColor" stroke="none"/>
      </svg>
      設定
    </button>
  </nav>
</div>

<!-- 名言追加・編集モーダル -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-title" id="modal-title">名言を追加</div>
    <div class="form-group">
      <label class="form-label">名言・格言</label>
      <textarea class="form-textarea" id="modal-text" placeholder="名言を入力してください..."></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">著者名</label>
      <input type="text" class="form-input" id="modal-author" placeholder="例：スティーブ・ジョブズ">
    </div>
    <div class="form-group">
      <label class="form-label">カテゴリ</label>
      <select class="form-select" id="modal-category">
        <option value="historical">偉人・歴史上の人物</option>
        <option value="philosophy">哲学・思想家</option>
        <option value="business">ビジネス・成功者</option>
        <option value="sports">スポーツ選手</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">人物紹介（任意）</label>
      <textarea class="form-textarea" id="modal-author-bio" placeholder="著者についての簡単な紹介を入力..."></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">背景・語源（任意）</label>
      <textarea class="form-textarea" id="modal-background" placeholder="この名言が生まれた背景や由来を入力..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" id="modal-cancel">キャンセル</button>
      <button class="btn-save" id="modal-save">保存する</button>
    </div>
  </div>
</div>

<!-- 名言詳細・日記モーダル -->
<div class="modal-overlay" id="detail-modal-overlay">
  <div class="modal">
    <div class="modal-title">名言の詳細</div>
    <div class="detail-badge-row">
      <span class="category-badge" id="detail-badge"></span>
      <span class="detail-date" id="detail-date"></span>
    </div>
    <div class="detail-quote-text" id="detail-text"></div>
    <div class="detail-quote-author" id="detail-author"></div>
    <div class="detail-info-block" id="detail-bio-block" style="display:none">
      <div class="detail-info-title">この人物について</div>
      <p class="detail-info-text" id="detail-bio-text"></p>
    </div>
    <div class="detail-info-block" id="detail-background-block" style="display:none">
      <div class="detail-info-title">この名言について</div>
      <p class="detail-info-text" id="detail-background-text"></p>
    </div>
    <div class="form-group" style="margin-top:20px">
      <label class="form-label">コメント</label>
      <textarea class="form-textarea" id="detail-diary-textarea" maxlength="100"></textarea>
      <div class="diary-char-row">
        <span id="detail-diary-count">0</span> / 100
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" id="detail-cancel">閉じる</button>
      <button class="btn-save" id="detail-save">保存</button>
    </div>
  </div>
</div>

<!-- インストールバナー -->
<div id="install-banner" class="install-banner">
  <div class="install-top">
    <svg class="install-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5M16.5 12 12 16.5m0 0L7.5 12m4.5 4.5V3" />
    </svg>
    <div class="install-msg" id="install-msg"></div>
    <button id="install-btn" class="install-add-btn">追加する</button>
    <button id="install-close" class="install-close-btn">✕</button>
  </div>
  <label class="install-check-label">
    <input type="checkbox" id="install-no-show">
    今後は表示しない
  </label>
</div>

<!-- トースト -->
<div class="toast" id="toast"></div>

<script src="js/quotes.js"></script>
<script src="js/app.js"></script>
</body>
</html>
